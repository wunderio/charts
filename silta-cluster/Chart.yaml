apiVersion: v2
appVersion: "1.0"
description: Setup a Silta Kubernetes cluster.
name: silta-cluster
version: 1.18.0
# csi-rclone external provisioner requires kubernetes 1.20+
# https://github.com/kubernetes-csi/external-provisioner?tab=readme-ov-file#compatibility
kubeVersion: '>=1.20.0-0'
dependencies:
- name: ingress-nginx
  # check kubernetes version requirements here: https://github.com/kubernetes/ingress-nginx
  version: 4.13.x
  repository: https://kubernetes.github.io/ingress-nginx
  condition: ingress-nginx.enabled
- name: traefik1
  alias: traefik
  version: 1.87.x
  repository: file://../forked/traefik/traefik-1.87.7
  condition: traefik.enabled
- name: traefik-crds
  alias: traefik3crds
  version: 1.x.x
  repository: https://traefik.github.io/charts
  condition: traefik3crds.enabled,traefik3.providers.kubernetesIngress.enabled,traefik3.providers.kubernetesGateway.enabled
- name: traefik
  alias: traefik3
  version: 39.x.x
  repository: https://traefik.github.io/charts
  # use traefik3.providers.kubernetesIngress.enabled or traefik3.providers.kubernetesGateway.enabled
  condition: traefik3.providers.kubernetesIngress.enabled,traefik3.providers.kubernetesGateway.enabled
- name: ingress-nginx
  # check kubernetes version requirements here: https://github.com/kubernetes/ingress-nginx
  version: 4.13.x
  alias: nginx-traefik
  repository: https://kubernetes.github.io/ingress-nginx
  condition: nginx-traefik.enabled
- name: pxc-operator
  version: 1.12.x
  repository: https://percona.github.io/percona-helm-charts/
  condition: pxc-operator.enabled
- name: minio
  version: 6.0.x
  # repository: https://helm.min.io/
  repository: file://../forked/minio/minio-6.0.5
  condition: minio.enabled
- name: csi-rclone
  version: 1.0.x
  repository: https://storage.googleapis.com/charts.wdr.io
  # repository: file://../csi-rclone
  condition: csi-rclone.enabled
- name: cert-manager
  version: 0.10.x
  repository: https://charts.jetstack.io/
  condition: cert-manager.enabled
- name: silta-proxy
  version: ^1.x
  repository: file://../silta-proxy
  condition: silta-proxy.enabled
- name: instana-agent
  version: 1.2.x
  repository: https://agents.instana.io/helm
  condition: instana-agent.enabled
- name: nfs-subdir-external-provisioner
  repository: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner
  version: 4.0.x
  condition: nfs-subdir-external-provisioner.enabled
- name: docker-registry
  repository: https://twuni.github.io/docker-registry.helm
  version: 2.1.x
  condition: docker-registry.enabled
