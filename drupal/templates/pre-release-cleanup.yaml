apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-cleanup"
  labels:
    {{- include "drupal.release_labels" . | nindent 4 }}
  annotations:
    # ArgoCD hook: run before sync, delete on success.
    # Without these, ttlSecondsAfterFinished=0 causes the Job to self-delete
    # and ArgoCD enters an endless sync loop trying to recreate it.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 0
  template:
    metadata:
      labels:
        {{- include "drupal.release_labels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      restartPolicy: Never
      containers:
      - name: cleanup
        {{- include "drupal.php-container" . | nindent 8 }}
        command: ["/bin/bash", "-c"]
        args:
        - |
            {{- include "drupal.cleanup-job" . | nindent 12 }}
        volumeMounts:
          {{- include "drupal.volumeMounts" . | nindent 12 }}
      serviceAccountName: {{ include "drupal.serviceAccountName" . }}
      volumes:
        {{- include "drupal.volumes" . | nindent 8 }}
